<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="calculator-container">
        <h1>Tip Calculator</h1>

        <section class="inputs">
            
            <div class="input-group">
                <label for="bill">Bill Amount (Rs)</label>
                <input type="number" id="bill" min="0" step="0.01" placeholder="0.00">
                <span id="bill-error" class="error-message"></span>
            </div>

            <div class="input-group">
                <label>Select Tip %</label>
                <div class="tip-buttons">
                    <button class="tip-btn" data-val="10">10%</button>
                    <button class="tip-btn" data-val="15">15%</button>
                    <button class="tip-btn" data-val="20">20%</button>
                    <input type="number" id="custom-tip" min="0" placeholder="Custom">
                </div>
                <span id="tip-error" class="error-message"></span>
            </div>

            <div class="input-group">
                <label for="people">Number of People</label>
                <input type="number" id="people" min="1" step="1" placeholder="1">
                <span id="people-error" class="error-message"></span>
            </div>

        </section>

        <section class="outputs">
            
            <div class="result-row">
                <p>Total Tip Amount</p>
                <span id="tip-amount-display">Rs 0.00</span>
            </div>

            <div class="result-row">
                <p>Grand Total (Bill + Tip)</p>
                <span id="grand-total-display">Rs 0.00</span>
            </div>

            <div class="result-row">
                <p>Per Person Share</p>
                <span id="per-person-display">Rs 0.00</span>
            </div>

            <button id="reset-btn">Reset</button>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
